<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LB 💖</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #050816, #000);
}

/* stars */
.stars {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: 0;
}

.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
    from { opacity: 0.2; }
    to { opacity: 1; }
}

/* moon */
.moon {
    position: absolute;
    top: 80px;
    left: -100px;
    width: 70px;
    height: 70px;
    background: #f5f3ce;
    border-radius: 50%;
    box-shadow: 0 0 40px rgba(255,255,200,0.6);
    animation: moveMoon 25s linear infinite;
}

@keyframes moveMoon {
    0% { left: -100px; }
    100% { left: 110vw; }
}

/* ENVELOPE WRAPPER */
.envelope {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    perspective: 1000px;
    cursor: pointer;
}

/* FRONT OF ENVELOPE */
.envelope-box {
    width: 220px;
    height: 150px;
    background: #ff4d6d;
    border-radius: 10px;
    position: relative;
    transform-origin: top;
    transition: transform 1s ease;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* FLAP (FLIP ANIMATION) */
.flap {
    position: absolute;
    width: 220px;
    height: 150px;
    background: #ff2e55;
    border-radius: 10px;
    top: 0;
    left: 0;
    transform-origin: top;
    transition: transform 1s ease;
    z-index: 2;
}

/* OPEN STATE */
.envelope.open .flap {
    transform: rotateX(-180deg);
}

/* LETTER */
.box {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    max-width: 520px;
    background: rgba(255,255,255,0.92);
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    display: none;
    z-index: 2;
}

.neon {
    font-size: 30px;
    color: #fff;
    text-shadow:
        0 0 5px #ff4d6d,
        0 0 10px #ff4d6d,
        0 0 20px #ff1e4d;
}

/* letter text */
#letter {
    font-size: 15px;
    white-space: pre-wrap;
    border-right: 2px solid #ff4d6d;
    min-height: 120px;
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>
<div class="moon"></div>

<!-- ENVELOPE -->
<div class="envelope" id="envelope" onclick="openEnvelope()">
    <div class="envelope-box"></div>
    <div class="flap"></div>
</div>

<!-- LETTER -->
<div class="box" id="box">
    <div class="neon">LB 💍</div>
    <div id="letter"></div>
</div>

<script>
/* stars */
function createStars() {
    const c = document.getElementById("stars");
    for (let i = 0; i < 120; i++) {
        let s = document.createElement("div");
        s.classList.add("star");
        s.style.left = Math.random() * 100 + "vw";
        s.style.top = Math.random() * 100 + "vh";
        c.appendChild(s);
    }
}
createStars();

/* OPEN ENVELOPE WITH FLIP */
function openEnvelope() {
    const env = document.getElementById("envelope");
    env.classList.add("open");

    setTimeout(() => {
        env.style.display = "none";
        document.getElementById("box").style.display = "block";
        typeText();
    }, 1200); // wait for flip animation
}

/* TYPE LETTER */
const text =
"Dear LB 💖\n\n" +
"You are my moon in the dark sky, my peace, and my forever person.\n" +
"I don’t just love you… I choose you every single day.\n\n" +
"Always yours. 💍";

let i = 0;
function typeText() {
    if (i < text.length) {
        document.getElementById("letter").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeText, 35);
    }
}
</script>

</body>
</html>
