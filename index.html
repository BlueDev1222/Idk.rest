<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlueDev | Server Control Panel</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff88;
    font-family: "Courier New", monospace;
    overflow-x: hidden;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

.terminal {
    padding: 40px;
    max-width: 1000px;
    margin: auto;
}

.glow {
    text-shadow: 0 0 10px #00ff88;
}

.section {
    margin-top: 40px;
    padding: 20px;
    border-left: 3px solid #00ff88;
    background: rgba(0,255,136,0.05);
}

.status-online { color: #00ff88; }
.status-offline { color: red; }

#console {
    background: black;
    border: 1px solid #00ff88;
    padding: 15px;
    height: 200px;
    overflow-y: auto;
    margin-top: 20px;
}

#input {
    width: 100%;
    background: black;
    border: none;
    border-top: 1px solid #00ff88;
    color: #00ff88;
    padding: 10px;
    font-family: inherit;
}

#input:focus {
    outline: none;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="terminal">
    <h1 class="glow">> BlueDev_Server_Control.exe</h1>

    <div class="section">
        <h2>> Live_Server_Status</h2>
        <p>Server: BlueSMP Network</p>
        <p>Status: <span id="status" class="status-online">ONLINE</span></p>
        <p>Players Online: <span id="players">12</span></p>
        <p>TPS: <span id="tps">20.0</span></p>
    </div>

    <div class="section">
        <h2>> Command_Console</h2>
        <div id="console"></div>
        <input type="text" id="input" placeholder="Type a command..." />
    </div>
</div>

<script>
// ===== Matrix Background =====
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");
canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letters = "01BLUEDEVMCODE";
const fontSize = 14;
const columns = canvas.width / fontSize;
const drops = [];

for (let x = 0; x < columns; x++) drops[x] = 1;

function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#00ff88";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
        const text = letters.charAt(Math.floor(Math.random() * letters.length));
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
        }
        drops[i]++;
    }
}
setInterval(draw, 35);

// ===== Fake Live Server Status =====
function updateServer() {
    const status = document.getElementById("status");
    const players = document.getElementById("players");
    const tps = document.getElementById("tps");

    const isOnline = Math.random() > 0.1;

    if (isOnline) {
        status.textContent = "ONLINE";
        status.className = "status-online";
        players.textContent = Math.floor(Math.random() * 50);
        tps.textContent = (19 + Math.random()).toFixed(2);
    } else {
        status.textContent = "OFFLINE";
        status.className = "status-offline";
        players.textContent = "0";
        tps.textContent = "0.00";
    }
}
setInterval(updateServer, 5000);

// ===== Fake Command Console =====
const consoleDiv = document.getElementById("console");
const input = document.getElementById("input");

function printToConsole(text) {
    consoleDiv.innerHTML += "> " + text + "<br>";
    consoleDiv.scrollTop = consoleDiv.scrollHeight;
}

input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        const command = input.value.toLowerCase();
        printToConsole(command);

        switch(command) {
            case "help":
                printToConsole("Available commands: help, status, players, clear, hack");
                break;
            case "status":
                printToConsole("Server status: " + document.getElementById("status").textContent);
                break;
            case "players":
                printToConsole("Players online: " + document.getElementById("players").textContent);
                break;
            case "hack":
                printToConsole("Accessing mainframe...");
                setTimeout(() => printToConsole("Just kidding 😈"), 1000);
                break;
            case "clear":
                consoleDiv.innerHTML = "";
                break;
            default:
                printToConsole("Unknown command. Type 'help'.");
        }

        input.value = "";
    }
});
</script>

</body>
</html>
