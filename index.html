<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food RNG Game</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #ffb347, #ff6b6b);
  color: white;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.container {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
}

.game-box, .inventory-box {
  background: rgba(0,0,0,0.25);
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

.game-box {
  width: 360px;
  text-align: center;
}

.inventory-box {
  width: 330px;
  max-height: 540px;
  overflow-y: auto;
}

.food {
  font-size: 85px;
  margin: 20px 0;
  transition: 0.3s;
}

.rollAnim {
  animation: rollSpin 0.6s ease;
}

@keyframes rollSpin {
  0% { transform: scale(0.5) rotate(0deg); opacity: 0.3; }
  50% { transform: scale(1.3) rotate(180deg); opacity: 1; }
  100% { transform: scale(1) rotate(360deg); }
}

.name {
  font-size: 30px;
  font-weight: bold;
}

.rarity {
  margin-top: 10px;
  font-size: 20px;
}

button {
  margin-top: 15px;
  padding: 12px 20px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: white;
  color: #ff6b6b;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  transform: scale(1.05);
  background: #ffe6e6;
}

.danger {
  background: #ff3333;
  color: white;
}

.item {
  background: rgba(255,255,255,0.15);
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.common { color: white; }
.uncommon { color: #7CFC00; }
.rare { color: #4da6ff; }
.epic { color: #c266ff; }
.legendary { color: gold; }
.mythic { color: #ff4df2; }
.secret { color: #00fff7; }
.godly { color: #ff2b2b; }
</style>
</head>

<body>

<div class="container">

  <div class="game-box">
    <h1>🍔 Food RNG 🍕</h1>

    <div class="food" id="foodEmoji">❓</div>
    <div class="name" id="foodName">Press Roll!</div>
    <div class="rarity" id="foodRarity"></div>

    <button onclick="rollFood()">ROLL FOOD</button>
    <button onclick="saveGame()">Save</button>
    <button class="danger" onclick="resetGame()">Reset</button>

    <div id="score">Rolls: 0</div>
  </div>

  <div class="inventory-box">
    <h2>🎒 Inventory</h2>
    <div id="inventory"></div>
  </div>

</div>

<script>
let rolls = 0;
let inventory = {};

const foods = [
  { emoji:"🍎", name:"Apple", rarity:"Common", chance:20 },
  { emoji:"🍌", name:"Banana", rarity:"Common", chance:20 },
  { emoji:"🍊", name:"Orange", rarity:"Common", chance:18 },
  { emoji:"🍇", name:"Grapes", rarity:"Common", chance:18 },
  { emoji:"🍉", name:"Watermelon", rarity:"Common", chance:16 },
  { emoji:"🍓", name:"Strawberry", rarity:"Common", chance:16 },
  { emoji:"🥕", name:"Carrot", rarity:"Common", chance:15 },
  { emoji:"🌽", name:"Corn", rarity:"Common", chance:15 },
  { emoji:"🍞", name:"Bread", rarity:"Common", chance:14 },
  { emoji:"🥚", name:"Egg", rarity:"Common", chance:14 },

  { emoji:"🍟", name:"Fries", rarity:"Uncommon", chance:10 },
  { emoji:"🍕", name:"Pizza", rarity:"Uncommon", chance:10 },
  { emoji:"🌭", name:"Hotdog", rarity:"Uncommon", chance:9 },
  { emoji:"🥞", name:"Pancakes", rarity:"Uncommon", chance:9 },
  { emoji:"🧇", name:"Waffle", rarity:"Uncommon", chance:8 },
  { emoji:"🥨", name:"Pretzel", rarity:"Uncommon", chance:8 },
  { emoji:"🥯", name:"Bagel", rarity:"Uncommon", chance:7 },
  { emoji:"🥪", name:"Sandwich", rarity:"Uncommon", chance:7 },
  { emoji:"🌯", name:"Burrito", rarity:"Uncommon", chance:6 },
  { emoji:"🥗", name:"Salad", rarity:"Uncommon", chance:6 },

  { emoji:"🍔", name:"Burger", rarity:"Rare", chance:5 },
  { emoji:"🍗", name:"Chicken Leg", rarity:"Rare", chance:4.5 },
  { emoji:"🥩", name:"Steak", rarity:"Rare", chance:4 },
  { emoji:"🍝", name:"Spaghetti", rarity:"Rare", chance:4 },
  { emoji:"🍛", name:"Curry Rice", rarity:"Rare", chance:3.5 },
  { emoji:"🍚", name:"Rice Bowl", rarity:"Rare", chance:3.5 },
  { emoji:"🥟", name:"Dumplings", rarity:"Rare", chance:3 },
  { emoji:"🍙", name:"Rice Ball", rarity:"Rare", chance:3 },
  { emoji:"🍖", name:"Meat Bone", rarity:"Rare", chance:2.8 },
  { emoji:"🥓", name:"Bacon", rarity:"Rare", chance:2.8 },

  { emoji:"🍣", name:"Sushi", rarity:"Epic", chance:2 },
  { emoji:"🍜", name:"Dragon Ramen", rarity:"Epic", chance:1.8 },
  { emoji:"🍤", name:"Tempura Shrimp", rarity:"Epic", chance:1.6 },
  { emoji:"🥘", name:"Royal Paella", rarity:"Epic", chance:1.5 },
  { emoji:"🧀", name:"Golden Cheese", rarity:"Epic", chance:1.4 },
  { emoji:"🍮", name:"Caramel Flan", rarity:"Epic", chance:1.2 },
  { emoji:"🍦", name:"Ice Cream", rarity:"Epic", chance:1.1 },
  { emoji:"🍩", name:"Glazed Donut", rarity:"Epic", chance:1 },

  { emoji:"🌮", name:"Golden Taco", rarity:"Legendary", chance:0.8 },
  { emoji:"🍰", name:"Royal Cake", rarity:"Legendary", chance:0.7 },
  { emoji:"🥧", name:"Ancient Pie", rarity:"Legendary", chance:0.6 },
  { emoji:"🧁", name:"Magic Cupcake", rarity:"Legendary", chance:0.5 },
  { emoji:"🍪", name:"Millionaire Cookie", rarity:"Legendary", chance:0.4 },

  { emoji:"🍜", name:"Galaxy Ramen", rarity:"Mythic", chance:0.25 },
  { emoji:"🍕", name:"Meteor Pizza", rarity:"Mythic", chance:0.2 },
  { emoji:"🍔", name:"Titan Burger", rarity:"Mythic", chance:0.15 },
  { emoji:"🍰", name:"Galaxy Cake", rarity:"Mythic", chance:0.1 },
  { emoji:"🧁", name:"Void Cupcake", rarity:"Mythic", chance:0.08 },

  { emoji:"🍣", name:"Shadow Sushi", rarity:"Secret", chance:0.04 },
  { emoji:"🌭", name:"Invisible Hotdog", rarity:"Secret", chance:0.03 },
  { emoji:"🍎", name:"Glitched Apple", rarity:"Secret", chance:0.02 },

  { emoji:"👑", name:"King Feast", rarity:"Godly", chance:0.01 },
  { emoji:"🌌", name:"Universe Meal", rarity:"Godly", chance:0.005 }
];

function rollFood() {
  rolls++;

  const foodEmoji = document.getElementById("foodEmoji");
  foodEmoji.classList.remove("rollAnim");
  void foodEmoji.offsetWidth;
  foodEmoji.classList.add("rollAnim");

  let totalChance = foods.reduce((sum, food) => sum + food.chance, 0);
  let random = Math.random() * totalChance;
  let total = 0;

  for (let food of foods) {
    total += food.chance;

    if (random <= total) {
      foodEmoji.innerText = food.emoji;
      document.getElementById("foodName").innerText = food.name;

      document.getElementById("foodRarity").innerHTML =
        `<span class="${food.rarity.toLowerCase()}">✨ ${food.rarity} ✨</span>`;

      if (!inventory[food.name]) {
        inventory[food.name] = {
          emoji: food.emoji,
          rarity: food.rarity,
          amount: 0
        };
      }

      inventory[food.name].amount++;

      updateInventory();
      updateScore();
      saveGame();
      break;
    }
  }
}

function updateInventory() {
  const inventoryDiv = document.getElementById("inventory");
  inventoryDiv.innerHTML = "";

  const sortedItems = Object.keys(inventory).sort();

  for (let item of sortedItems) {
    const food = inventory[item];

    inventoryDiv.innerHTML += `
      <div class="item">
        <span>${food.emoji} ${item}</span>
        <span class="${food.rarity.toLowerCase()}">x${food.amount}</span>
      </div>
    `;
  }
}

function updateScore() {
  document.getElementById("score").innerText = "Rolls: " + rolls;
}

function saveGame() {
  const saveData = {
    rolls: rolls,
    inventory: inventory
  };

  localStorage.setItem("foodRNGSave", JSON.stringify(saveData));
}

function loadGame() {
  const saved = localStorage.getItem("foodRNGSave");

  if (saved) {
    const data = JSON.parse(saved);
    rolls = data.rolls || 0;
    inventory = data.inventory || {};
  }

  updateScore();
  updateInventory();
}

function resetGame() {
  if (confirm("Are you sure you want to reset your save?")) {
    rolls = 0;
    inventory = {};
    localStorage.removeItem("foodRNGSave");

    document.getElementById("foodEmoji").innerText = "❓";
    document.getElementById("foodName").innerText = "Press Roll!";
    document.getElementById("foodRarity").innerText = "";

    updateScore();
    updateInventory();
  }
}

loadGame();
</script>

</body>
</html>
