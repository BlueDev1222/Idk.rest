<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LB 💖</title>

<style>
body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #0b0f2a, #000);
}

/* STAR BACKGROUND */
.stars {
    position: absolute;
    width: 100%;
    height: 100%;
    background: transparent;
    overflow: hidden;
    z-index: 0;
}

.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    opacity: 0.8;
    animation: twinkle 2s infinite ease-in-out alternate;
}

@keyframes twinkle {
    from { opacity: 0.2; transform: scale(1); }
    to { opacity: 1; transform: scale(1.8); }
}

/* MAIN BOX */
.box {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90%;
    max-width: 520px;
    background: rgba(255,255,255,0.92);
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 0 30px rgba(255,255,255,0.2);
    z-index: 2;
}

/* NEON NAME */
.neon {
    font-size: 28px;
    color: #fff;
    text-shadow:
        0 0 5px #ff4d6d,
        0 0 10px #ff4d6d,
        0 0 20px #ff1e4d,
        0 0 40px #ff1e4d;
    margin-bottom: 10px;
}

/* typing text */
#message {
    font-size: 16px;
    color: #333;
    min-height: 100px;
    white-space: pre-wrap;
    border-right: 2px solid #ff4d6d;
}

/* hearts */
.heart {
    position: absolute;
    color: #ff4d6d;
    font-size: 20px;
    animation: floatUp 4s linear forwards;
    z-index: 1;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}

/* mobile */
@media (max-width: 600px) {
    .neon { font-size: 22px; }
    #message { font-size: 14px; }
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<div class="box">
    <div class="neon">YOUR GIRLFRIEND NAME 💍</div>
    <div id="message"></div>
</div>

<script>
/* STAR CREATION */
function createStars() {
    const starsContainer = document.getElementById("stars");

    for (let i = 0; i < 120; i++) {
        let star = document.createElement("div");
        star.classList.add("star");

        star.style.left = Math.random() * 100 + "vw";
        star.style.top = Math.random() * 100 + "vh";
        star.style.animationDuration = (1 + Math.random() * 3) + "s";
        star.style.opacity = Math.random();

        starsContainer.appendChild(star);
    }
}
createStars();

/* typing text */
const text =
"I love you more than anything in this world. You are my peace, my happiness, and my favorite person. " +
"No matter where life takes us, I want you by my side. Always. 💖";

let i = 0;
function typeText() {
    if (i < text.length) {
        document.getElementById("message").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeText, 35);
    }
}
typeText();

/* floating hearts */
function createHeart(x, y) {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";

    heart.style.left = x + "px";
    heart.style.top = y + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 4000);
}

/* swipe / touch hearts */
let lastX = 0;
let lastY = 0;

document.addEventListener("touchmove", (e) => {
    let t = e.touches[0];
    if (Math.abs(t.clientX - lastX) > 10 || Math.abs(t.clientY - lastY) > 10) {
        createHeart(t.clientX, t.clientY);
        lastX = t.clientX;
        lastY = t.clientY;
    }
});

/* click hearts */
document.addEventListener("click", (e) => {
    for (let i = 0; i < 5; i++) {
        createHeart(e.clientX, e.clientY);
    }
});
</script>

</body>
</html>
