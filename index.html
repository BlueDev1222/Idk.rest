<!doctype html>
<html lang="en">
<head>
    <title>Wilden.fun Map</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font: 12px/1.5 "Helvetica Neue", Arial, Helvetica, sans-serif; }
        #map { width: 100%; height: 100vh; background: black; }
        img.leaflet-tile { image-rendering: pixelated; image-rendering: -moz-crisp-edges; }

        /* Sidebar */
        #sidebar {
            display: flex; flex-flow: column;
            position: absolute; top: 0; right: 0; width: 0; height: 100vh;
            padding-left: 10px; z-index: 10000;
            border-left: 1px solid #000;
            background-color: rgba(0,0,0,0.6); color: #fff;
            text-align: right; transition: all 0.25s;
        }
        #sidebar.show { width: 200px; padding-left: 0; }
        #sidebar fieldset {
            clear: right; margin: 30px 0; border: none;
            border-top: 1px solid rgba(196,196,196,0.4);
            text-align: left; transition: all 0.25s; white-space: nowrap;
        }
        #sidebar fieldset#worlds { margin: -15px 0 0; }
        #sidebar fieldset#players {
            margin: 10px 0 0; overflow-y: auto; flex: 1;
        }
        #sidebar fieldset#players::-webkit-scrollbar { width: 6px; }
        #sidebar fieldset#players::-webkit-scrollbar-thumb {
            background-color: rgba(0,0,0,0);
            border-right: 2px solid rgba(112,128,144,0.75);
        }
        #sidebar legend { display: block; margin: 10px 5px; }
        #sidebar fieldset a, #sidebar fieldset a:visited {
            display: block; color: #fff; text-decoration: none;
            padding: 5px 10px; transition: all 0.25s; cursor: pointer;
        }
        #sidebar fieldset a.following { background-color: rgba(128,128,255,0.25); }
        #sidebar fieldset a:hover, #sidebar fieldset a.following:hover {
            background-color: rgba(255,255,255,0.15);
        }
        #sidebar fieldset a img {
            vertical-align: middle; padding-right: 10px;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.5));
            -webkit-filter: drop-shadow(0 0 5px rgba(255,255,255,0.5));
        }
        #sidebar fieldset#players a { padding: 10px; }

        /* Multi-map grid container */
        #multi-map-container {
            display: grid;
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 5000; background: #000; gap: 2px; padding: 2px;
        }
        .map-cell {
            border: 1px solid #333; position: relative; overflow: hidden;
        }
        .map-cell .world-label {
            position: absolute; top: 5px; left: 5px; z-index: 6000;
            color: #fff; background: rgba(0,0,0,0.6);
            padding: 2px 8px; border-radius: 3px;
            font: 12px/1.5 "Helvetica Neue", Arial, Helvetica, sans-serif;
            pointer-events: none;
        }
        .map-cell .click-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 5500; cursor: pointer;
        }
        .map-cell .click-overlay:hover { background: rgba(255,255,255,0.05); }

        /* Nameplates */
        .nameplate-container {
            display: flex; gap: 0.375rem; align-items: center; margin: 0;
        }
        .nameplate-col2 { display: flex; gap: 0.125rem; flex-direction: column; }
        div.leaflet-nameplate-pane > div {
            background: rgba(0,0,0,0.5); color: #fff; font-weight: 700;
            margin: 0; border-color: rgba(0,0,0,0.75); line-height: 1;
        }
        div.leaflet-nameplate-pane div:before { border-color: transparent; }
        img.head { height: 16px; image-rendering: pixelated; image-rendering: -moz-crisp-edges; }
        div.leaflet-nameplate-pane div img.armor,
        div.leaflet-nameplate-pane div img.health {
            display: block; height: 9px; width: max-content;
            image-rendering: pixelated; image-rendering: -moz-crisp-edges;
        }
        div.leaflet-nameplate-pane div, div.leaflet-marker-pane img { transition: all 0.25s; }
        .leaflet-bottom.leaflet-left .link, .leaflet-bottom.leaflet-left .coordinates { display: inline-block; float: none; }
        div.leaflet-control-layers.coordinates {
            vertical-align: bottom; padding: 2px 5px; line-height: 14px; height: 30px;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="sidebar">
        <fieldset id="worlds">
            <legend>Worlds</legend>
        </fieldset>
        <fieldset id="players">
            <legend>Players (0/0)</legend>
        </fieldset>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // ─── BASE URL ────────────────────────────────────────────────────
        const BASE = "http://map.wilden.fun:25940";

        // ─── UTILITY ─────────────────────────────────────────────────────
        const fetchJSON = (path) =>
            fetch(`${BASE}/${path}`, { cache: "no-store" }).then(r => r.ok ? r.json() : null);

        function pixelsToMeters(num, zoom) {
            return num / Math.pow(2, zoom);
        }
        function toLatLng(x, z, zoom) {
            return L.latLng(pixelsToMeters(-z, zoom), pixelsToMeters(x, zoom));
        }

        // ─── STATE ───────────────────────────────────────────────────────
        let worlds = new Map();          // name -> { name, display_name, type, icon, order, settings }
        let curWorld = null;
        let showAll = false;
        let leafletMap = null;
        let tileLayer = null;
        let multiContainer = null;

        // ─── MAIN LEAFLET MAP ────────────────────────────────────────────
        function initMainMap() {
            leafletMap = L.map("map", {
                crs: L.CRS.Simple,
                center: [0, 0],
                attributionControl: false,
                preferCanvas: true,
                noWrap: true,
            });
        }

        function setBackground(world) {
            const mapEl = document.getElementById("map");
            switch (world.type) {
                case "nether": mapEl.style.background = "url('${BASE}/images/nether_sky.png')"; break;
                case "the_end": mapEl.style.background = "url('${BASE}/images/end_sky.png')"; break;
                default: mapEl.style.background = "url('${BASE}/images/overworld_sky.png')"; break;
            }
        }

        function loadWorld(name, callback) {
            const world = worlds.get(name);
            if (!world) return;

            // Remove previous tile layer
            if (tileLayer) {
                leafletMap.removeLayer(tileLayer);
                tileLayer = null;
            }

            curWorld = world;
            const s = world.settings;

            // Background
            setBackground(world);

            // Tile layer
            tileLayer = L.tileLayer(`${BASE}/tiles/${world.name}/{z}/{x}/{y}.png`, {
                minZoom: 0,
                maxZoom: s.zoom.max + s.zoom.extra,
                tileSize: 512,
                noWrap: true,
                errorTileUrl: "",
            }).addTo(leafletMap);

            // View
            leafletMap.setView(toLatLng(s.spawn.x, s.spawn.z, s.zoom.max), s.zoom.def)
                .setMinZoom(0)
                .setMaxZoom(s.zoom.max + s.zoom.extra);

            // Title
            document.title = `squaremap - ${world.display_name}`;

            if (callback) callback(world);
        }

        // ─── SHOW ALL MAPS ──────────────────────────────────────────────
        function toggleShowAll() {
            showAll = !showAll;
            const btn = document.getElementById("show-all-btn");
            if (showAll) {
                btn.textContent = "Show Single Map";
                btn.style.backgroundColor = "rgba(128,128,255,0.25)";
                showAllMaps();
            } else {
                btn.textContent = "Show All Maps";
                btn.style.backgroundColor = "";
                hideAllMaps();
            }
        }

        function showAllMaps() {
            // Hide main map
            document.getElementById("map").style.display = "none";

            // Remove old container
            const old = document.getElementById("multi-map-container");
            if (old) old.remove();

            const count = worlds.size;
            const cols = Math.ceil(Math.sqrt(count));
            const rows = Math.ceil(count / cols);

            multiContainer = document.createElement("div");
            multiContainer.id = "multi-map-container";
            multiContainer.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            multiContainer.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
            document.body.appendChild(multiContainer);

            for (const [name, world] of worlds) {
                const s = world.settings;
                if (!s) continue;

                const cell = document.createElement("div");
                cell.className = "map-cell";

                // Background
                switch (world.type) {
                    case "nether": cell.style.background = `url('${BASE}/images/nether_sky.png')`; break;
                    case "the_end": cell.style.background = `url('${BASE}/images/end_sky.png')`; break;
                    default: cell.style.background = `url('${BASE}/images/overworld_sky.png')`; break;
                }

                // Label
                const label = document.createElement("div");
                label.className = "world-label";
                label.textContent = world.display_name;
                cell.appendChild(label);

                // Click overlay
                const overlay = document.createElement("div");
                overlay.className = "click-overlay";
                overlay.onclick = () => {
                    showAll = false;
                    const btn = document.getElementById("show-all-btn");
                    btn.textContent = "Show All Maps";
                    btn.style.backgroundColor = "";
                    hideAllMaps();
                    loadWorld(name, () => {
                        leafletMap.invalidateSize();
                    });
                };
                cell.appendChild(overlay);

                multiContainer.appendChild(cell);

                // Leaflet map inside cell
                const mini = L.map(cell, {
                    crs: L.CRS.Simple,
                    center: [0, 0],
                    attributionControl: false,
                    preferCanvas: true,
                    noWrap: true,
                    zoomControl: false,
                    dragging: false,
                    scrollWheelZoom: false,
                    doubleClickZoom: false,
                    touchZoom: false,
                    keyboard: false,
                });

                L.tileLayer(`${BASE}/tiles/${name}/{z}/{x}/{y}.png`, {
                    minZoom: 0,
                    maxZoom: s.zoom.max + s.zoom.extra,
                    tileSize: 512,
                    noWrap: true,
                    errorTileUrl: "",
                }).addTo(mini);

                mini.setView(toLatLng(s.spawn.x, s.spawn.z, s.zoom.max), s.zoom.def);
                setTimeout(() => mini.invalidateSize(), 100);
            }
        }

        function hideAllMaps() {
            if (multiContainer) {
                multiContainer.remove();
                multiContainer = null;
            }
            document.getElementById("map").style.display = "";
            if (leafletMap) leafletMap.invalidateSize();
            if (curWorld) {
                loadWorld(curWorld.name);
            }
        }

        // ─── BUILD SIDEBAR ──────────────────────────────────────────────
        function buildSidebar() {
            const worldsFieldset = document.getElementById("worlds");
            const playersFieldset = document.getElementById("players");

            // World links
            for (const [name, world] of worlds) {
                const a = document.createElement("a");
                a.href = "#";

                const img = document.createElement("img");
                img.src = world.icon
                    ? `${BASE}/images/icon/${world.icon}.png`
                    : world.type === "nether" ? `${BASE}/images/icon/red-cube-smol.png`
                    : world.type === "the_end" ? `${BASE}/images/icon/purple-cube-smol.png`
                    : `${BASE}/images/icon/green-cube-smol.png`;
                a.appendChild(img);

                const span = document.createElement("span");
                span.textContent = world.display_name;
                a.appendChild(span);

                a.onclick = () => {
                    if (showAll) toggleShowAll();
                    if (curWorld && curWorld.name === name) {
                        const s = world.settings;
                        leafletMap.setView(toLatLng(s.spawn.x, s.spawn.z, s.zoom.max), s.zoom.def);
                        return;
                    }
                    loadWorld(name);
                    document.title = `squaremap - ${world.display_name}`;
                };
                worldsFieldset.appendChild(a);
            }

            // Show All button
            const showAllBtn = document.createElement("a");
            showAllBtn.id = "show-all-btn";
            showAllBtn.style.cssText = "border-top: 1px solid rgba(196,196,196,0.4); margin-top: 5px; font-weight: bold;";
            const allImg = document.createElement("img");
            allImg.src = `${BASE}/images/icon/green-cube-smol.png`;
            showAllBtn.appendChild(allImg);
            showAllBtn.appendChild(document.createTextNode("Show All Maps"));
            showAllBtn.onclick = toggleShowAll;
            worldsFieldset.appendChild(showAllBtn);
        }

        // ─── PLAYER TICK ────────────────────────────────────────────────
        let playerInterval = null;

        function startPlayerPolling() {
            playerInterval = setInterval(() => {
                if (showAll || !curWorld) return;
                fetchJSON(`tiles/${curWorld.name}/markers.json`).then(json => {
                    if (!json) return;
                    // Clear old player markers (keep non-player layers)
                    const playerLayer = document.getElementById("player-markers");
                    // For simplicity we just re-fetch; full impl would use L.LayerGroup
                });
            }, 5000);
        }

        // ─── init ───────────────────────────────────────────────────────
        async function init() {
            initMainMap();

            // Fetch settings
            const settings = await fetchJSON("tiles/settings.json");
            if (!settings) {
                document.body.innerHTML = "<h1 style='color:#fff;padding:20px;'>Failed to load map settings</h1>";
                return;
            }

            // Fetch per-world settings
            for (const w of settings.worlds) {
                const worldSettings = await fetchJSON(`tiles/${w.name}/settings.json`);
                worlds.set(w.name, {
                    name: w.name,
                    display_name: w.display_name,
                    type: w.type,
                    icon: w.icon,
                    order: w.order,
                    settings: worldSettings,
                });
            }

            // Sort by order
            worlds = new Map([...worlds].sort((a, b) => a[1].order - b[1].order));

            // Build sidebar
            buildSidebar();

            // Load first world
            const first = [...worlds.values()][0];
            if (first) {
                loadWorld(first.name);
            }

            startPlayerPolling();
        }

        init();
    </script>
</body>
</html>
