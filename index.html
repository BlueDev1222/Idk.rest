<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Food Orange Game 🍊</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: #111;
    color: white;
}

#game {
    width: 100vw;
    height: 100vh;
    position: relative;
}

.player {
    width: 50px;
    height: 50px;
    background: orange;
    border-radius: 50%;
    position: absolute;
}

.roll {
    animation: rollAnim 0.3s linear infinite;
}

@keyframes rollAnim {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

.food {
    width: 30px;
    height: 30px;
    position: absolute;
    border-radius: 5px;
    cursor: pointer;
}

#inventory {
    position: fixed;
    right: 10px;
    top: 10px;
    width: 220px;
    height: 90%;
    background: rgba(0,0,0,0.7);
    overflow-y: auto;
    padding: 10px;
    border: 2px solid orange;
}

.inv-item {
    padding: 5px;
    margin: 3px 0;
    background: #222;
    border-left: 4px solid orange;
}

button {
    position: fixed;
    bottom: 10px;
    right: 10px;
    padding: 10px;
    background: red;
    color: white;
    border: none;
    cursor: pointer;
}
</style>
</head>
<body>

<div id="game"></div>
<div id="inventory"><b>Inventory</b></div>
<button onclick="resetData()">Reset Save</button>

<script>
const game = document.getElementById("game");
const inventoryUI = document.getElementById("inventory");

// PLAYER
const player = document.createElement("div");
player.classList.add("player");
game.appendChild(player);

let x = 200;
let y = 200;
let speed = 4;

// INVENTORY
let inventory = {};

// FOODS (50)
const foods = [
"Apple","Banana","Burger","Pizza","Hotdog","Fries","Taco","Donut","Cake","Cookie",
"Ice Cream","Steak","Chicken","Fish","Sushi","Rice","Pasta","Bread","Cheese","Egg",
"Pancake","Waffle","Salad","Soup","Sandwich","Cereal","Milk","Orange","Grapes","Watermelon",
"Strawberry","Blueberry","Mango","Pineapple","Avocado","Carrot","Potato","Corn","Beans","Peas",
"Chocolate","Candy","Popcorn","Nachos","Ramen","Dumplings","Shrimp","Lobster","Bacon","Sausage"
];

// SAVE DATA
function saveData() {
    const data = {
        inventory: inventory
    };
    localStorage.setItem("foodOrangeSave", JSON.stringify(data));
}

// LOAD DATA
function loadData() {
    const data = localStorage.getItem("foodOrangeSave");

    if (data) {
        const parsed = JSON.parse(data);

        if (parsed.inventory) {
            inventory = parsed.inventory;
        }
    }

    renderInventory();
}

// RESET DATA
function resetData() {
    localStorage.removeItem("foodOrangeSave");
    inventory = {};
    renderInventory();
}

// SPAWN FOODS
foods.forEach(food => {
    const f = document.createElement("div");
    f.classList.add("food");

    f.style.left = Math.random() * (window.innerWidth - 30) + "px";
    f.style.top = Math.random() * (window.innerHeight - 30) + "px";
    f.style.background = `hsl(${Math.random()*360},70%,60%)`;
    f.title = food;

    f.onclick = () => {
        collectFood(food);
        f.remove();
    };

    game.appendChild(f);
});

// COLLECT FOOD
function collectFood(food) {
    if (!inventory[food]) inventory[food] = 0;
    inventory[food]++;

    renderInventory();
    saveData(); // save instantly
}

// RENDER INVENTORY
function renderInventory() {
    inventoryUI.innerHTML = "<b>Inventory</b>";

    for (let item in inventory) {
        const div = document.createElement("div");
        div.className = "inv-item";
        div.innerText = `${item} x${inventory[item]}`;
        inventoryUI.appendChild(div);
    }
}

// CONTROLS
let keys = {};

document.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e => {
    keys[e.key.toLowerCase()] = false;
});

// GAME LOOP
function update() {
    let moving = false;

    if (keys["w"]) { y -= speed; moving = true; }
    if (keys["s"]) { y += speed; moving = true; }
    if (keys["a"]) { x -= speed; moving = true; }
    if (keys["d"]) { x += speed; moving = true; }

    player.style.left = x + "px";
    player.style.top = y + "px";

    if (moving) {
        player.classList.add("roll");
    } else {
        player.classList.remove("roll");
    }

    requestAnimationFrame(update);
}

// LOAD SAVE
loadData();

// AUTO SAVE EVERY 10s
setInterval(saveData, 10000);

// START GAME
update();
</script>

</body>
</html>
