<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food RNG Game</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:linear-gradient(135deg,#ffb347,#ff6b6b);
  color:white;
  min-height:100vh;
  padding:20px;
}
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:20px;
  max-width:1400px;
  margin:auto;
}
.box{
  background:rgba(0,0,0,.28);
  padding:22px;
  border-radius:20px;
  box-shadow:0 0 20px rgba(0,0,0,.4);
}
.game-box{text-align:center}
.food{
  font-size:90px;
  margin:20px 0;
}
.rollAnim{animation:rollSpin .55s ease}
@keyframes rollSpin{
  0%{transform:scale(.4) rotate(0deg);opacity:.3}
  50%{transform:scale(1.3) rotate(180deg);opacity:1}
  100%{transform:scale(1) rotate(360deg)}
}
.name{font-size:30px;font-weight:bold}
.rarity{font-size:20px;margin-top:8px}
button{
  padding:11px 16px;
  margin:6px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
  background:white;
  color:#ff5b5b;
}
button:hover{transform:scale(1.04)}
.danger{background:#ff3333;color:white}
.green{background:#37ff7a;color:#102b14}
.item,.achievement,.indexItem,.stat{
  background:rgba(255,255,255,.15);
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.scroll{
  max-height:420px;
  overflow-y:auto;
}
.locked{opacity:.45}
.common{color:white}
.uncommon{color:#7CFC00}
.rare{color:#4da6ff}
.epic{color:#c266ff}
.legendary{color:gold}
.mythic{color:#ff4df2}
.secret{color:#00fff7}
.godly{color:#ff2b2b}
</style>
</head>

<body>

<div class="container">

  <div class="box game-box">
    <h1>🍔 Food RNG 🍕</h1>
    <div class="food" id="foodEmoji">❓</div>
    <div class="name" id="foodName">Press Roll!</div>
    <div class="rarity" id="foodRarity"></div>

    <button onclick="rollFood()">ROLL FOOD</button>
    <button class="green" onclick="toggleAutoRoll()">AUTO ROLL</button>
    <button onclick="saveGame()">SAVE</button>
    <button class="danger" onclick="resetGame()">RESET</button>

    <p id="rollsText">Rolls: 0</p>
    <p id="coinsText">Coins: 0</p>
    <p id="autoText">Auto Roller: OFF</p>
  </div>

  <div class="box">
    <h2>🥚 Food Crates</h2>
    <button onclick="openCrate('Breakfast')">🍳 Breakfast Crate - 100 Coins</button>
    <button onclick="openCrate('Fast Food')">🍔 Fast Food Crate - 500 Coins</button>
    <button onclick="openCrate('Dessert')">🍰 Dessert Crate - 2,000 Coins</button>
    <button onclick="openCrate('Space')">🚀 Space Crate - 10,000 Coins</button>
    <button onclick="openCrate('Void')">🕳️ Void Crate - 100,000 Coins</button>
    <p id="crateResult"></p>
  </div>

  <div class="box">
    <h2>🎒 Inventory</h2>
    <button onclick="sellDuplicates()">Sell Duplicates</button>
    <div id="inventory" class="scroll"></div>
  </div>

  <div class="box">
    <h2>🏆 Achievements</h2>
    <div id="achievements" class="scroll"></div>
  </div>

  <div class="box">
    <h2>📖 Food Index</h2>
    <p id="indexProgress"></p>
    <div id="foodIndex" class="scroll"></div>
  </div>

  <div class="box">
    <h2>📊 Stats</h2>
    <div id="stats"></div>
  </div>

</div>

<script>
let rolls = 0;
let coins = 0;
let inventory = {};
let discovered = {};
let achievements = {};
let autoRolling = false;
let autoInterval = null;
let autoRolls = 0;
let rarestFood = "None";
let playTime = 0;

const foods = [
  {emoji:"🍎",name:"Apple",rarity:"Common",chance:20,value:1},
  {emoji:"🍌",name:"Banana",rarity:"Common",chance:20,value:1},
  {emoji:"🍊",name:"Orange",rarity:"Common",chance:18,value:1},
  {emoji:"🍇",name:"Grapes",rarity:"Common",chance:18,value:1},
  {emoji:"🍉",name:"Watermelon",rarity:"Common",chance:16,value:1},
  {emoji:"🍓",name:"Strawberry",rarity:"Common",chance:16,value:1},
  {emoji:"🥕",name:"Carrot",rarity:"Common",chance:15,value:1},
  {emoji:"🌽",name:"Corn",rarity:"Common",chance:15,value:1},
  {emoji:"🍞",name:"Bread",rarity:"Common",chance:14,value:1},
  {emoji:"🥚",name:"Egg",rarity:"Common",chance:14,value:1},

  {emoji:"🍟",name:"Fries",rarity:"Uncommon",chance:10,value:5},
  {emoji:"🍕",name:"Pizza",rarity:"Uncommon",chance:10,value:5},
  {emoji:"🌭",name:"Hotdog",rarity:"Uncommon",chance:9,value:5},
  {emoji:"🥞",name:"Pancakes",rarity:"Uncommon",chance:9,value:5},
  {emoji:"🧇",name:"Waffle",rarity:"Uncommon",chance:8,value:5},
  {emoji:"🥨",name:"Pretzel",rarity:"Uncommon",chance:8,value:5},
  {emoji:"🥯",name:"Bagel",rarity:"Uncommon",chance:7,value:5},
  {emoji:"🥪",name:"Sandwich",rarity:"Uncommon",chance:7,value:5},

  {emoji:"🍔",name:"Burger",rarity:"Rare",chance:5,value:25},
  {emoji:"🍗",name:"Chicken Leg",rarity:"Rare",chance:4.5,value:25},
  {emoji:"🥩",name:"Steak",rarity:"Rare",chance:4,value:25},
  {emoji:"🍝",name:"Spaghetti",rarity:"Rare",chance:4,value:25},
  {emoji:"🍛",name:"Curry Rice",rarity:"Rare",chance:3.5,value:25},
  {emoji:"🥟",name:"Dumplings",rarity:"Rare",chance:3,value:25},

  {emoji:"🍣",name:"Sushi",rarity:"Epic",chance:2,value:100},
  {emoji:"🍜",name:"Dragon Ramen",rarity:"Epic",chance:1.8,value:100},
  {emoji:"🍤",name:"Tempura Shrimp",rarity:"Epic",chance:1.6,value:100},
  {emoji:"🥘",name:"Royal Paella",rarity:"Epic",chance:1.5,value:100},
  {emoji:"🧀",name:"Golden Cheese",rarity:"Epic",chance:1.4,value:100},

  {emoji:"🌮",name:"Golden Taco",rarity:"Legendary",chance:.8,value:500},
  {emoji:"🍰",name:"Royal Cake",rarity:"Legendary",chance:.7,value:500},
  {emoji:"🥧",name:"Ancient Pie",rarity:"Legendary",chance:.6,value:500},
  {emoji:"🧁",name:"Magic Cupcake",rarity:"Legendary",chance:.5,value:500},

  {emoji:"☄️",name:"Meteor Pizza",rarity:"Mythic",chance:.2,value:2500},
  {emoji:"🍔",name:"Titan Burger",rarity:"Mythic",chance:.15,value:2500},
  {emoji:"🍰",name:"Galaxy Cake",rarity:"Mythic",chance:.1,value:2500},
  {emoji:"🧁",name:"Void Cupcake",rarity:"Mythic",chance:.08,value:2500},

  {emoji:"🕳️",name:"Black Hole Donut",rarity:"Secret",chance:.04,value:10000},
  {emoji:"🍎",name:"Glitched Apple",rarity:"Secret",chance:.03,value:10000},
  {emoji:"🧪",name:"Glitched Soup",rarity:"Secret",chance:.02,value:10000},
  {emoji:"🍔",name:"Admin Burger",rarity:"Secret",chance:.01,value:10000},

  {emoji:"👑",name:"King Feast",rarity:"Godly",chance:.006,value:50000},
  {emoji:"🌌",name:"Universe Meal",rarity:"Godly",chance:.003,value:100000}
];

const crates = {
  "Breakfast": { cost:100, items:["Bread","Egg","Pancakes","Waffle","Bacon"] },
  "Fast Food": { cost:500, items:["Fries","Pizza","Hotdog","Burger","Golden Taco"] },
  "Dessert": { cost:2000, items:["Royal Cake","Ancient Pie","Magic Cupcake","Galaxy Cake","Void Cupcake"] },
  "Space": { cost:10000, items:["Meteor Pizza","Galaxy Cake","Universe Meal"] },
  "Void": { cost:100000, items:["Black Hole Donut","Glitched Apple","Glitched Soup","Admin Burger","Universe Meal"] }
};

const achievementList = [
  {id:"first",name:"🍎 First Bite",desc:"Roll 1 time"},
  {id:"roll50",name:"🎲 Lucky Roller",desc:"Roll 50 times"},
  {id:"roll500",name:"🔥 Grinder",desc:"Roll 500 times"},
  {id:"collector25",name:"📦 Collector",desc:"Discover 25 foods"},
  {id:"legendary",name:"⭐ Legendary Taste",desc:"Get a Legendary food"},
  {id:"mythic",name:"🌌 Myth Hunter",desc:"Get a Mythic food"},
  {id:"secret",name:"🕵️ Secret Hunter",desc:"Get a Secret food"},
  {id:"godly",name:"👑 Food God",desc:"Get a Godly food"},
  {id:"auto",name:"⚡ Never Stop",desc:"Use Auto Roller"}
];

function rollFood(){
  rolls++;
  const food = getRandomFood(foods);
  giveFood(food);
  animateFood(food);
  coins += food.value;
  checkAchievements(food);
  updateAll();
  saveGame();
}

function getRandomFood(list){
  let totalChance = list.reduce((sum,item)=>sum+item.chance,0);
  let random = Math.random() * totalChance;
  let total = 0;

  for(let item of list){
    total += item.chance;
    if(random <= total) return item;
  }

  return list[0];
}

function giveFood(food){
  if(!inventory[food.name]){
    inventory[food.name] = {
      emoji:food.emoji,
      rarity:food.rarity,
      amount:0,
      value:food.value
    };
  }

  inventory[food.name].amount++;
  discovered[food.name] = true;

  if(rarestFood === "None" || rarityPower(food.rarity) > rarityPower(getFoodByName(rarestFood)?.rarity || "Common")){
    rarestFood = food.name;
  }
}

function animateFood(food){
  const emoji = document.getElementById("foodEmoji");
  emoji.classList.remove("rollAnim");
  void emoji.offsetWidth;
  emoji.classList.add("rollAnim");

  emoji.innerText = food.emoji;
  document.getElementById("foodName").innerText = food.name;
  document.getElementById("foodRarity").innerHTML =
    `<span class="${food.rarity.toLowerCase()}">✨ ${food.rarity} ✨</span>`;
}

function openCrate(crateName){
  const crate = crates[crateName];

  if(coins < crate.cost){
    document.getElementById("crateResult").innerText = "Not enough coins!";
    return;
  }

  coins -= crate.cost;

  const crateFoods = crate.items
    .map(name => getFoodByName(name))
    .filter(Boolean);

  const food = crateFoods[Math.floor(Math.random() * crateFoods.length)];

  giveFood(food);
  animateFood(food);
  checkAchievements(food);

  document.getElementById("crateResult").innerHTML =
    `You opened a ${crateName} Crate and got ${food.emoji} <b>${food.name}</b>!`;

  updateAll();
  saveGame();
}

function toggleAutoRoll(){
  autoRolling = !autoRolling;

  if(autoRolling){
    unlockAchievement("auto");
    autoInterval = setInterval(()=>{
      autoRolls++;
      rollFood();
    },1000);
  }else{
    clearInterval(autoInterval);
  }

  updateAll();
  saveGame();
}

function sellDuplicates(){
  let earned = 0;

  for(let item in inventory){
    if(inventory[item].amount > 1){
      let extra = inventory[item].amount - 1;
      earned += extra * inventory[item].value;
      inventory[item].amount = 1;
    }
  }

  coins += earned;
  alert("Sold duplicates for " + earned + " coins!");
  updateAll();
  saveGame();
}

function checkAchievements(food){
  if(rolls >= 1) unlockAchievement("first");
  if(rolls >= 50) unlockAchievement("roll50");
  if(rolls >= 500) unlockAchievement("roll500");
  if(Object.keys(discovered).length >= 25) unlockAchievement("collector25");

  if(food.rarity === "Legendary") unlockAchievement("legendary");
  if(food.rarity === "Mythic") unlockAchievement("mythic");
  if(food.rarity === "Secret") unlockAchievement("secret");
  if(food.rarity === "Godly") unlockAchievement("godly");
}

function unlockAchievement(id){
  achievements[id] = true;
}

function updateAll(){
  document.getElementById("rollsText").innerText = "Rolls: " + rolls;
  document.getElementById("coinsText").innerText = "Coins: " + coins;
  document.getElementById("autoText").innerText = "Auto Roller: " + (autoRolling ? "ON" : "OFF");

  updateInventory();
  updateAchievements();
  updateFoodIndex();
  updateStats();
}

function updateInventory(){
  const div = document.getElementById("inventory");
  div.innerHTML = "";

  Object.keys(inventory).sort().forEach(item=>{
    const food = inventory[item];
    div.innerHTML += `
      <div class="item">
        <span>${food.emoji} ${item}</span>
        <span class="${food.rarity.toLowerCase()}">x${food.amount}</span>
      </div>
    `;
  });
}

function updateAchievements(){
  const div = document.getElementById("achievements");
  div.innerHTML = "";

  achievementList.forEach(a=>{
    const unlocked = achievements[a.id];
    div.innerHTML += `
      <div class="achievement ${unlocked ? "" : "locked"}">
        <span>${a.name}<br><small>${a.desc}</small></span>
        <span>${unlocked ? "✅" : "🔒"}</span>
      </div>
    `;
  });
}

function updateFoodIndex(){
  const div = document.getElementById("foodIndex");
  const found = Object.keys(discovered).length;

  document.getElementById("indexProgress").innerText =
    `Collected: ${found} / ${foods.length}`;

  div.innerHTML = "";

  foods.forEach(food=>{
    const seen = discovered[food.name];

    div.innerHTML += `
      <div class="indexItem ${seen ? "" : "locked"}">
        <span>${seen ? food.emoji + " " + food.name : "❓ Unknown Food"}</span>
        <span class="${seen ? food.rarity.toLowerCase() : ""}">
          ${seen ? food.rarity : "Locked"}
        </span>
      </div>
    `;
  });
}

function updateStats(){
  let totalFoods = Object.values(inventory).reduce((sum,item)=>sum+item.amount,0);
  let percent = ((Object.keys(discovered).length / foods.length) * 100).toFixed(1);

  document.getElementById("stats").innerHTML = `
    <div class="stat"><span>Total Rolls</span><b>${rolls}</b></div>
    <div class="stat"><span>Coins</span><b>${coins}</b></div>
    <div class="stat"><span>Total Foods</span><b>${totalFoods}</b></div>
    <div class="stat"><span>Foods Found</span><b>${Object.keys(discovered).length}</b></div>
    <div class="stat"><span>Index Complete</span><b>${percent}%</b></div>
    <div class="stat"><span>Auto Rolls</span><b>${autoRolls}</b></div>
    <div class="stat"><span>Rarest Food</span><b>${rarestFood}</b></div>
    <div class="stat"><span>Play Time</span><b>${formatTime(playTime)}</b></div>
  `;
}

function saveGame(){
  const data = {
    rolls,
    coins,
    inventory,
    discovered,
    achievements,
    autoRolls,
    rarestFood,
    playTime
  };

  localStorage.setItem("foodRNGSave", JSON.stringify(data));
}

function loadGame(){
  const saved = localStorage.getItem("foodRNGSave");

  if(saved){
    const data = JSON.parse(saved);

    rolls = data.rolls || 0;
    coins = data.coins || 0;
    inventory = data.inventory || {};
    discovered = data.discovered || {};
    achievements = data.achievements || {};
    autoRolls = data.autoRolls || 0;
    rarestFood = data.rarestFood || "None";
    playTime = data.playTime || 0;
  }

  updateAll();
}

function resetGame(){
  if(confirm("Reset all progress?")){
    localStorage.removeItem("foodRNGSave");
    location.reload();
  }
}

function getFoodByName(name){
  return foods.find(food=>food.name === name);
}

function rarityPower(rarity){
  const power = {
    Common:1,
    Uncommon:2,
    Rare:3,
    Epic:4,
    Legendary:5,
    Mythic:6,
    Secret:7,
    Godly:8
  };

  return power[rarity] || 1;
}

function formatTime(seconds){
  let h = Math.floor(seconds / 3600);
  let m = Math.floor((seconds % 3600) / 60);
  let s = seconds % 60;

  return `${h}h ${m}m ${s}s`;
}

setInterval(()=>{
  playTime++;
  saveGame();
  updateStats();
},1000);

loadGame();
</script>

</body>
</html>
